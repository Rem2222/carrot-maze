<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrot Maze — Python vs Rabbits</title>
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;padding:0;background:radial-gradient(ellipse at center,#1e2a1e 0%,#0a0f0a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.035)2px,rgba(0,0,0,0.035)4px);pointer-events:none;z-index:100}
.game-wrapper{position:relative;border:3px solid #8d6e4c;border-radius:8px;box-shadow:0 0 40px rgba(141,110,76,0.3),inset 0 0 20px rgba(0,0,0,0.5);background:#5d4037}
canvas{display:block;width:900px;height:600px;image-rendering:pixelated;image-rendering:crisp-edges}
#game-over{position:absolute;inset:0;background:rgba(0,0,0,0.78);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:10;animation:fadeIn .4s ease-out;border-radius:5px}
#game-over.visible{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.game-over-title{font-family:'Courier New',monospace;font-size:36px;color:#ff5252;text-shadow:0 0 20px rgba(255,82,82,0.5);margin:0 0 8px;letter-spacing:4px}
.final-score{font-size:22px;color:#ffd54f;margin:4px 0}
.high-score{font-size:16px;color:#a5d6a7;margin:4px 0 16px}
.level-display{font-size:14px;color:#81c784;margin:2px 0}
.restart-btn{font-family:'Courier New',monospace;font-size:18px;padding:10px 32px;background:#4caf50;color:#fff;border:2px solid #66bb6a;border-radius:4px;cursor:pointer;transition:background .15s;letter-spacing:2px}
.restart-btn:hover{background:#66bb6a}
.hint{font-size:12px;color:rgba(255,255,255,0.4);margin-top:10px}
</style>
</head>
<body>
<div class="game-wrapper">
<canvas id="game" width="900" height="600"></canvas>
<div id="game-over">
<div class="game-over-title">GAME OVER</div>
<div class="final-score">Score: <span id="final-score">0</span></div>
<div class="level-display">Level: <span id="final-level">1</span></div>
<div class="high-score">Best: <span id="high-score">0</span></div>
<button class="restart-btn" id="restart-btn">PLAY AGAIN</button>
<div class="hint">Press ENTER or SPACE to restart</div>
</div>
</div>
<script>
(function(){
  "use strict";

  // ---------- Const ----------
  const COLS = 30, ROWS = 20, CELL = 30;
  const BASE_TICK_MS = 500; // 2 Hz — 4x slower than original 125ms
  const RABBITS_PER_LEVEL = 3; // level up after eating this many

  // Speed per level: each level is slightly faster
  function currentTickMs(level) {
    // Level 1: 500ms, Level 2: 400ms, Level 3: 333ms, etc.
    // Never below 150ms
    return Math.max(150, Math.floor(BASE_TICK_MS / (1 + (level - 1) * 0.25)));
  }

  const FLOOR = 0, BED = 1;
  const DIRS = {UP:{dx:0,dy:-1},DOWN:{dx:0,dy:1},LEFT:{dx:-1,dy:0},RIGHT:{dx:1,dy:0}};

  // ---------- Canvas ----------
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;

  // ---------- Level Patterns ----------
  // Simple predefined patterns. 0=FLOOR(path), 1=BED(wall/bush)
  // Each pattern is 30x20 grid

  function generateOpenField() {
    // Level 1: completely open field — no walls at all
    // User said: "Первый уровень - без грядок (стенок)"
    // Rabbits spawn on FLOOR for this level
    return Array.from({length: ROWS}, () => Array(COLS).fill(FLOOR));
  }

  function generateOneWall() {
    // Level 2: one horizontal wall across the middle, with small carrot islands
    const grid = Array.from({length: ROWS}, () => Array(COLS).fill(FLOOR));
    const midY = Math.floor(ROWS / 2);
    const startX = 5;
    const endX = COLS - 6;
    for (let x = startX; x <= endX; x += 2) {
      grid[midY][x] = BED;
    }
    // Small carrot islands (for rabbits to inhabit)
    for (let x = startX + 3; x <= endX - 3; x += 8) {
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          const cx = x + dx, cy = midY + dy;
          if (cx >= 1 && cx < COLS-1 && cy >= 1 && cy < ROWS-1) {
            grid[cy][cx] = BED;
          }
        }
      }
    }
    return grid;
  }

  function generateTwoWalls() {
    // Level 3: two parallel walls
    const grid = Array.from({length: ROWS}, () => Array(COLS).fill(FLOOR));
    const y1 = Math.floor(ROWS * 0.3);
    const y2 = Math.floor(ROWS * 0.7);
    const startX = 4;
    const endX = COLS - 5;
    for (let x = startX; x <= endX; x++) {
      grid[y1][x] = BED;
      grid[y2][x] = BED;
    }
    // Add some L-shaped extensions
    grid[y1 - 1][startX + 2] = BED;
    grid[y1 - 1][startX + 3] = BED;
    grid[y2 + 1][endX - 2] = BED;
    grid[y2 + 1][endX - 3] = BED;
    return grid;
  }

  function generateCross() {
    // Level 4: cross pattern
    const grid = Array.from({length: ROWS}, () => Array(COLS).fill(FLOOR));
    const midX = Math.floor(COLS / 2);
    const midY = Math.floor(ROWS / 2);
    // Vertical wall
    for (let y = 3; y < ROWS - 3; y++) {
      grid[y][midX] = BED;
    }
    // Horizontal wall
    for (let x = 3; x < COLS - 3; x++) {
      grid[midY][x] = BED;
    }
    // Thicken at intersection
    grid[midY - 1][midX - 1] = BED;
    grid[midY - 1][midX] = BED;
    grid[midY + 1][midX] = BED;
    grid[midY][midX - 1] = BED;
    return grid;
  }

  function generatePatterns() {
    // Level 5+: diagonal patterns and more complex layouts
    const grid = Array.from({length: ROWS}, () => Array(COLS).fill(FLOOR));
    const patternType = Math.floor(Math.random() * 3);
    if (patternType === 0) {
      // Diagonal stripes
      for (let i = 0; i < ROWS * 2; i += 3) {
        for (let r = 0; r < ROWS; r++) {
          const c = i - r;
          if (c >= 0 && c < COLS) grid[r][c] = BED;
        }
      }
    } else if (patternType === 1) {
      // Checkerboard rooms
      for (let r = 0; r < ROWS; r += 5) {
        for (let c = 0; c < COLS; c += 6) {
          for (let dr = 0; dr < 3; dr++) {
            for (let dc = 0; dc < 3; dc++) {
              const x = c + dc, y = r + dr;
              if (x < COLS && y < ROWS) grid[y][x] = BED;
            }
          }
        }
      }
    } else {
      // Spiralish: concentric L-shapes
      for (let layer = 0; layer < 4; layer++) {
        const offset = layer * 2 + 2;
        if (offset >= Math.min(COLS, ROWS) / 2) break;
        // Top
        for (let x = offset; x < COLS - offset; x++) grid[offset][x] = BED;
        // Bottom
        for (let x = offset; x < COLS - offset; x++) grid[ROWS - 1 - offset][x] = BED;
        // Left (skip corners already set)
        for (let y = offset + 1; y < ROWS - 1 - offset; y++) grid[y][offset] = BED;
        // Right (skip corners already set)
        for (let y = offset + 1; y < ROWS - 1 - offset; y++) grid[y][COLS - 1 - offset] = BED;
      }
    }
    return grid;
  }

  // ---------- Maze Generation (Hardcore mode) ----------
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function generateHardcoreMaze() {
    const gridW = 14, gridH = 9;
    const maze = Array.from({length: ROWS}, () => Array(COLS).fill(BED));
    const visited = Array.from({length: gridH}, () => Array(gridW).fill(false));
    function dfs(c, r) {
      visited[r][c] = true;
      const mx = c * 2 + 1, my = r * 2 + 1;
      maze[my][mx] = FLOOR;
      const dirs = shuffle([[0,-1],[0,1],[-1,0],[1,0]]);
      for (const [dc, dr] of dirs) {
        const nc = c + dc, nr = r + dr;
        if (nc >= 0 && nc < gridW && nr >= 0 && nr < gridH && !visited[nr][nc]) {
          maze[my + dr][mx + dc] = FLOOR;
          dfs(nc, nr);
        }
      }
    }
    dfs(Math.floor(gridW/2), Math.floor(gridH/2));
    return maze;
  }

  // ---------- Level System ----------
  function generateLevel(level) {
    if (level >= 6) return generateHardcoreMaze();
    switch(level) {
      case 1: return generateOpenField();
      case 2: return generateOneWall();
      case 3: return generateTwoWalls();
      case 4: return generateCross();
      default: return generatePatterns();
    }
  }

  const maze = generateLevel(1);

  // ---------- Bed graph (for rabbit movement) ----------
  function buildBedGraphFromMaze(mazeArr) {
    bedCells.length = 0;
    bedNbrs.clear();
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (mazeArr[r][c] === BED) bedCells.push(c + "," + r);
      }
    }
    for (const key of bedCells) {
      const [x, y] = key.split(",").map(Number);
      const nbrs = [];
      for (const d of [DIRS.UP, DIRS.DOWN, DIRS.LEFT, DIRS.RIGHT]) {
        const nx = x + d.dx, ny = y + d.dy;
        if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && mazeArr[ny][nx] === BED) {
          nbrs.push(nx + "," + ny);
        }
      }
      bedNbrs.set(key, nbrs);
    }
  }
  
  const bedCells = [];
  const bedNbrs = new Map();
  // Initial build at load time (will be rebuilt on game start)
  buildBedGraphFromMaze(generateLevel(1));

  // ---------- Shake ----------
  const shake = { intensity: 0, decay: 0.88 };
  function doShake(v) { shake.intensity = Math.max(shake.intensity, v); }
  function updateShake() {
    if (shake.intensity < 0.3) { shake.intensity = 0; return; }
    shake.intensity *= shake.decay;
  }
  function shakeOffset() {
    if (shake.intensity < 0.3) return { x: 0, y: 0 };
    return {
      x: (Math.random() - 0.5) * shake.intensity * 2,
      y: (Math.random() - 0.5) * shake.intensity * 2
    };
  }

  // ---------- Particles ----------
  let particles = [];
  function emitParticles(x, y, color, count, speed, life) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = speed * (0.3 + Math.random() * 0.7);
      particles.push({
        x: x, y: y, color: color,
        vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 1,
        size: 3 + Math.random() * 4, life: life * (0.5 + Math.random() * 0.5),
        maxLife: life * (0.5 + Math.random() * 0.5)
      });
    }
  }
  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * (dt / 16);
      p.y += p.vy * (dt / 16);
      p.vy += 0.15;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }
  function drawParticles() {
    for (const p of particles) {
      const alpha = Math.max(0, p.life / p.maxLife);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(Math.floor(p.x - p.size / 2), Math.floor(p.y - p.size / 2), p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  // ---------- BFS on bed graph ----------
  function bfsFromSnake(bedKeys, snakeHead) {
    const dist = new Map();
    for (const k of bedKeys) dist.set(k, 99);
    let closestKey = null, closestDist = Infinity;
    for (const k of bedKeys) {
      const [bx, by] = k.split(",").map(Number);
      const d = Math.abs(bx - snakeHead.x) + Math.abs(by - snakeHead.y);
      if (d < closestDist) { closestDist = d; closestKey = k; }
    }
    if (!closestKey) return dist;
    dist.set(closestKey, 0);
    const q = [closestKey];
    while (q.length > 0) {
      const cur = q.shift(), curD = dist.get(cur);
      for (const nb of (bedNbrs.get(cur) || [])) {
        if (dist.get(nb) > curD + 1) { dist.set(nb, curD + 1); q.push(nb); }
      }
    }
    return dist;
  }

  // ---------- Game state ----------
  let game = null;

  // ---------- Safe snake start finder ----------
  function findSafeSnakeStart(mazeArr) {
    const dirList = [[0,-1],[0,1],[-1,0],[1,0]];
    let best = null, bestScore = -1;
    for (let r = 2; r < ROWS - 2; r++) {
      for (let c = 3; c < COLS - 4; c++) {
        if (mazeArr[r][c] === BED) continue;
        if (mazeArr[r][c-1] === BED || mazeArr[r][c-2] === BED) continue;
        const bodyCells = [{x: c-1, y: r}, {x: c-2, y: r}];
        let safeDirs = 0, maxClear = 0;
        for (const [dx, dy] of dirList) {
          const nx = c + dx, ny = r + dy;
          if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && mazeArr[ny][nx] !== BED) {
            if (bodyCells.some(bc => bc.x === nx && bc.y === ny)) continue;
            safeDirs++;
            let clear = 1;
            for (let i = 2; i < 10; i++) {
              const fx = c + dx * i, fy = r + dy * i;
              if (fx < 0 || fx >= COLS || fy < 0 || fy >= ROWS || mazeArr[fy][fx] === BED) break;
              clear++;
            }
            if (clear > maxClear) maxClear = clear;
          }
        }
        if (safeDirs < 2) continue;
        if (maxClear < 3) continue;
        const centerDist = Math.abs(c - COLS/2) + Math.abs(r - ROWS/2);
        const score = maxClear * 10 + safeDirs * 5 - centerDist;
        if (score > bestScore) {
          bestScore = score;
          best = {x: c, y: r};
        }
      }
    }
    if (best) return best;
    for (let r = 2; r < ROWS - 2; r++) {
      for (let c = 2; c < COLS - 2; c++) {
        if (mazeArr[r][c] === BED) continue;
        const bodyCells2 = [{x: c-1, y: r}, {x: c-2, y: r}];
        let safeDirs = 0;
        for (const [dx, dy] of dirList) {
          const nx = c + dx, ny = r + dy;
          if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && mazeArr[ny][nx] !== BED) {
            if (bodyCells2.some(bc => bc.x === nx && bc.y === ny)) continue;
            safeDirs++;
          }
        }
        if (safeDirs >= 2) return {x: c, y: r};
      }
    }
    for (let r = 1; r < ROWS - 1; r++)
      for (let c = 1; c < COLS - 1; c++)
        if (mazeArr[r][c] !== BED) return {x: c, y: r};
    return {x: 15, y: 10};
  }

  function newGame() {
    const lvl = 1;
    const m = generateLevel(lvl);
    const ss = findSafeSnakeStart(m);
    buildBedGraphFromMaze(m);
    return {
      level: lvl,
      rabbitsEaten: 0,
      maze: m,
      snake: [{x:ss.x, y:ss.y}, {x:ss.x-1, y:ss.y}, {x:ss.x-2, y:ss.y}],
      dir: {dx:0, dy:0}, nextDir: {dx:0, dy:0},
      growPending: 0,
      rabbits: [],
      score: 0,
      highScore: Math.max(0, parseInt(localStorage.getItem("crmz_hi") || "0")),
      alive: false,
      accumulator: 0,
      spawnTimer: 0,
      eatenCarrots: new Set() // R3: track eaten carrots
    };
  }

  // ---------- Rabbit AI ----------
  function randPersonality() {
    return { boldness: 0.3 + Math.random() * 0.5, skittishness: 0.2 + Math.random() * 0.7, speed: 0.5 + Math.random() * 0.5 };
  }

  function makeRabbit(bedKey) {
    const [bx, by] = bedKey.split(",").map(Number);
    const p = randPersonality();
    const interval = 2500 + p.boldness * 1500 + (Math.random() - 0.5) * 1000;
    return {
      bedKey: bedKey, prevBedKey: null,
      vx: bx * CELL + CELL / 2, vy: by * CELL + CELL / 2,
      jumping: false, targetBedKey: null, animProgress: 0, animDuration: 300, jumpOffset: 0,
      jumpTimer: interval * 0.3 + Math.random() * interval * 0.3,
      jumpInterval: interval,
      freezeTimer: 0,
      carrotEatTimer: 2000 + Math.random() * 3000,
      eatingCarrot: false,
      isFloorRabbit: false,
      personality: p
    };
  }
  
  function makeFloorRabbit(floorKey) {
    const [bx, by] = floorKey.split(",").map(Number);
    const p = randPersonality();
    const interval = 3000 + Math.random() * 2000;
    return {
      bedKey: floorKey, prevBedKey: null,
      vx: bx * CELL + CELL / 2, vy: by * CELL + CELL / 2,
      jumping: false, targetBedKey: null, animProgress: 0, animDuration: 400, jumpOffset: 0,
      jumpTimer: interval * 0.3 + Math.random() * interval * 0.3,
      jumpInterval: interval,
      freezeTimer: 0,
      carrotEatTimer: 5000,
      eatingCarrot: false,
      isFloorRabbit: true,
      personality: p
    };
  }

  function spawnInitialRabbits(state) {
    const n = 4 + Math.floor(Math.random() * 2);
    // If no BED cells available (Level 1), use FLOOR cells for rabbit spawn
    const pool = bedCells.length > 0 ? bedCells : [];
    if (pool.length === 0) {
      // Spawn on FLOOR tiles far from snake
      const floorPool = [];
      const head = state.snake[0];
      for (let r = 2; r < ROWS - 2; r++) {
        for (let c = 2; c < COLS - 2; c++) {
          if (state.maze[r][c] === FLOOR && (Math.abs(r - head.y) + Math.abs(c - head.x)) > 6) {
            floorPool.push(c + "," + r);
          }
        }
      }
      const shuffled = floorPool.sort(() => Math.random() - 0.5);
      for (let i = 0; i < Math.min(n, shuffled.length); i++) {
        state.rabbits.push(makeFloorRabbit(shuffled[i]));
      }
    } else {
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      for (let i = 0; i < Math.min(n, shuffled.length); i++) {
        state.rabbits.push(makeRabbit(shuffled[i]));
      }
    }
  }

  function respawnRabbit(state) {
    const occupied = new Set(state.rabbits.map(r => r.bedKey));
    const free = bedCells.filter(k => !occupied.has(k));
    if (free.length > 0) {
      state.rabbits.push(makeRabbit(free[Math.floor(Math.random() * free.length)]));
    } else {
      // No free BED cells - try spawning on FLOOR
      const head = state.snake[0];
      let tries = 0;
      while (tries < 20) {
        const rx = 2 + Math.floor(Math.random() * (COLS - 4));
        const ry = 2 + Math.floor(Math.random() * (ROWS - 4));
        if (state.maze[ry][rx] === FLOOR && (Math.abs(ry - head.y) + Math.abs(rx - head.x)) > 5) {
          const key = rx + "," + ry;
          if (!occupied.has(key)) {
            state.rabbits.push(makeFloorRabbit(key));
            return;
          }
        }
        tries++;
      }
    }
  }

  function weightedPick(candidates) {
    if (candidates.length === 0) return null;
    if (candidates.length === 1) return candidates[0].bed;
    const total = candidates.reduce((s, c) => s + Math.max(0.01, c.score), 0);
    let r = Math.random() * total;
    for (const c of candidates) {
      r -= Math.max(0.01, c.score);
      if (r <= 0) return c.bed;
    }
    return candidates[candidates.length - 1].bed;
  }

  function fleeScore(bedKey, rabbit, bedDist, rabbits) {
    let score = (bedDist.get(bedKey) || 0) * 2;
    if (Math.random() < 0.2) score += (Math.random() - 0.5) * 10;
    if (rabbits.some(r => r.bedKey === bedKey && r !== rabbit)) score -= 3;
    if (bedKey === rabbit.prevBedKey) score -= 5;
    return score;
  }

  function roamScore(bedKey, rabbit, rabbits) {
    let score = 0;
    if (bedKey === rabbit.prevBedKey) score -= 0.4;
    if (rabbits.some(r => r.bedKey === bedKey && r !== rabbit)) score -= 0.5;
    // R2: carrot affinity — prefer cells with uneaten carrots
    const [c, r] = bedKey.split(",").map(Number);
    if ((r * 13 + c * 7) % 5 < 2) {
      score += 0.35;
      if (game && game.eatenCarrots && !game.eatenCarrots.has(bedKey)) score += 0.2;
    }
    score += (Math.random() - 0.5) * 0.8;
    return score;
  }

  function getFloorNbrs(key) {
    const [x, y] = key.split(",").map(Number);
    const nbrs = [];
    for (const d of [DIRS.UP, DIRS.DOWN, DIRS.LEFT, DIRS.RIGHT]) {
      const nx = x + d.dx, ny = y + d.dy;
      if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
        nbrs.push(nx + "," + ny);
      }
    }
    return nbrs;
  }

  function selectTarget(rabbit, state) {
    const nbrs = rabbit.isFloorRabbit 
      ? getFloorNbrs(rabbit.bedKey) 
      : (bedNbrs.get(rabbit.bedKey) || []);
    if (nbrs.length === 0) return null;
    const head = state.snake[0];
    const bedDist = bfsFromSnake(bedCells, head);
    const distToSnake = bedDist.get(rabbit.bedKey) || 99;
    const dangerThresh = 3 + rabbit.personality.skittishness * 2;
    let candidates;
    if (distToSnake <= dangerThresh) {
      candidates = nbrs.map(b => ({ bed: b, score: fleeScore(b, rabbit, bedDist, state.rabbits) }));
    } else {
      candidates = nbrs.map(b => ({ bed: b, score: roamScore(b, rabbit, state.rabbits) }));
    }
    candidates.sort((a, b) => b.score - a.score);
    return weightedPick(candidates.slice(0, Math.min(2, candidates.length)));
  }

  function startJump(rabbit, targetKey) {
    rabbit.targetBedKey = targetKey;
    rabbit.prevBedKey = rabbit.bedKey;
    rabbit.animProgress = 0;
    rabbit.animDuration = 300 / rabbit.personality.speed;
    rabbit.jumping = true;
    rabbit.jumpOffset = 0;
  }

  function finishJump(rabbit) {
    const [tx, ty] = rabbit.targetBedKey.split(",").map(Number);
    rabbit.vx = tx * CELL + CELL / 2;
    rabbit.vy = ty * CELL + CELL / 2;
    rabbit.bedKey = rabbit.targetBedKey;
    rabbit.targetBedKey = null;
    rabbit.jumping = false;
    rabbit.jumpOffset = 0;
    rabbit.jumpInterval = 2500 + rabbit.personality.boldness * 1500 + (Math.random() - 0.5) * 1000;
    rabbit.jumpTimer = rabbit.jumpInterval;
  }

  function updateRabbits(state, dt) {
    for (let i = state.rabbits.length - 1; i >= 0; i--) {
      const r = state.rabbits[i];
      if (r.jumping) {
        r.animProgress += dt / r.animDuration;
        if (r.animProgress >= 1) { finishJump(r); continue; }
        const [px, py] = (r.prevBedKey || r.bedKey).split(",").map(Number);
        const [tx, ty] = r.targetBedKey.split(",").map(Number);
        const t = easeInOutQuad(r.animProgress);
        r.vx = lerp(px * CELL + CELL / 2, tx * CELL + CELL / 2, t);
        r.vy = lerp(py * CELL + CELL / 2, ty * CELL + CELL / 2, t);
        r.jumpOffset = Math.sin(t * Math.PI) * 16;
        continue;
      }
      r.jumpTimer -= dt;
      if (r.freezeTimer > 0) {
        r.freezeTimer -= dt;
        if (r.freezeTimer > 0) continue;
      }
      // Carrot eating behavior
      r.carrotEatTimer -= dt;
      if (r.carrotEatTimer <= 0 && !r.eatingCarrot) {
        r.eatingCarrot = true;
        // R3: mark carrot at current position as eaten
        const [ec, er] = r.bedKey.split(",").map(Number);
        if ((er * 13 + ec * 7) % 5 < 2) {
          state.eatenCarrots.add(r.bedKey);
        }
        r.carrotEatTimer = 800; // eat animation duration
      }
      if (r.eatingCarrot) {
        if (r.carrotEatTimer <= 0) {
          r.eatingCarrot = false;
          r.carrotEatTimer = 2000 + Math.random() * 3000;
        }
        continue; // don't move while eating
      }
      const head = state.snake[0];
      const [rbx, rby] = r.bedKey.split(",").map(Number);
      const distToHead = Math.abs(rbx - head.x) + Math.abs(rby - head.y);
      if (distToHead <= 1 && Math.random() < 0.15) {
        r.freezeTimer = 500;
        continue;
      }
      if (r.jumpTimer <= 0) {
        const target = selectTarget(r, state);
        if (target && target !== r.bedKey) startJump(r, target);
        else r.jumpTimer = r.jumpInterval;
      }
    }
  }

  function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
  function lerp(a, b, t) { return a + (b - a) * t; }

  // ---------- Snake update ----------
  function updateSnake(state) {
    state.dir = { dx: state.nextDir.dx, dy: state.nextDir.dy };
    if (state.dir.dx === 0 && state.dir.dy === 0) return true;
    const head = state.snake[0];
    const nh = { x: head.x + state.dir.dx, y: head.y + state.dir.dy };

    // Bounds + wall (BED is impassable)
    if (nh.x < 0 || nh.x >= COLS || nh.y < 0 || nh.y >= ROWS) return false;
    if (state.maze[nh.y][nh.x] === BED) return false;

    // Self collision
    for (let i = 0; i < state.snake.length; i++) {
      if (state.snake[i].x === nh.x && state.snake[i].y === nh.y) return false;
    }

    state.snake.unshift(nh);
    let ate = false;

    // Rabbit collision: 
    // - Floor rabbits: eat when head reaches same cell
    // - Bed rabbits: eat when head is adjacent (distance <= 1)
    for (let i = state.rabbits.length - 1; i >= 0; i--) {
      const r = state.rabbits[i];
      if (!r.jumping) {
        const [bx, by] = r.bedKey.split(",").map(Number);
        const dist = Math.abs(nh.x - bx) + Math.abs(nh.y - by);
        let eatDist = r.isFloorRabbit ? 0 : 1;
        if (dist <= eatDist) {
          emitParticles(bx * CELL + CELL / 2, by * CELL + CELL / 2, "#ffffff", 12, 3, 500);
          emitParticles(bx * CELL + CELL / 2, by * CELL + CELL / 2, "#f7931e", 6, 2, 400);
          doShake(4);
          state.rabbits.splice(i, 1);
          state.score += 10;
          state.rabbitsEaten++;
          state.growPending++;
          ate = true;

          // Level progression: every RABBITS_PER_LEVEL rabbits eaten = new level
          if (state.rabbitsEaten % RABBITS_PER_LEVEL === 0 && state.level < 10) {
            advanceLevel(state);
          }
          break;
        }
      }
    }

    if (state.growPending > 0) state.growPending--;
    else state.snake.pop();

    if (ate && state.rabbits.length < 3) state.spawnTimer = 3000;
    return true;
  }

  function advanceLevel(state) {
    state.level++;
    // Generate new maze for new level
    const newMaze = generateLevel(state.level);
    state.maze = newMaze;
    // Find safe start position
    const ss = findSafeSnakeStart(newMaze);
    state.snake = [{x:ss.x, y:ss.y}, {x:ss.x-1, y:ss.y}, {x:ss.x-2, y:ss.y}];
    state.dir = {dx:0, dy:0};
    state.nextDir = {dx:0, dy:0};
    state.growPending = 0;
    state.accumulator = 0;
    state.eatenCarrots = new Set(); // R3: fresh carrots for new level
    // Rebuild bed graph for new maze
    buildBedGraphFromMaze(newMaze);
    // Move rabbits to random available BED positions
    const shuffled = [...bedCells].sort(() => Math.random() - 0.5);
    for (let i = 0; i < state.rabbits.length; i++) {
      if (i < shuffled.length) {
        const [bx, by] = shuffled[i].split(",").map(Number);
        state.rabbits[i].bedKey = shuffled[i];
        state.rabbits[i].prevBedKey = null;
        state.rabbits[i].vx = bx * CELL + CELL / 2;
        state.rabbits[i].vy = by * CELL + CELL / 2;
        state.rabbits[i].jumping = false;
      }
    }
    doShake(6);
  }

  // ---------- Input ----------
  const keyMap = {
    ArrowUp: "UP", ArrowDown: "DOWN", ArrowLeft: "LEFT", ArrowRight: "RIGHT",
    w: "UP", W: "UP", s: "DOWN", S: "DOWN", a: "LEFT", A: "LEFT", d: "RIGHT", D: "RIGHT"
  };

  function handleKeyDown(e) {
    if (!game) return;
    if (!game.alive && (e.key === "Enter" || e.key === " " || e.key === "Space")) {
      e.preventDefault();
      startGame();
      return;
    }
    const dirName = keyMap[e.key];
    if (dirName) {
      e.preventDefault();
      const d = DIRS[dirName];
      if (game.nextDir.dx !== -d.dx || game.nextDir.dy !== -d.dy) {
        game.nextDir = d;
        if (game.dir.dx === 0 && game.dir.dy === 0) {
          game.dir = {dx: d.dx, dy: d.dy};
        }
      }
    }
  }

  document.addEventListener("keydown", handleKeyDown);
  document.getElementById("restart-btn").addEventListener("click", startGame);

  // ---------- Drawing ----------
  let animTime = 0;

  function drawMaze() {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const tile = game ? game.maze[r][c] : BED; // initial draw defaults
        const x = c * CELL, y = r * CELL;
        if (tile === BED) {
          // Garden bed / wall — GREEN (bushes)
          ctx.fillStyle = (r + c) % 2 === 0 ? "#4a7c3f" : "#3d5a2e"; // R1: lightened for contrast
          ctx.fillRect(x, y, CELL, CELL);
          // Dark border
          ctx.fillStyle = "#1b3a0f";
          ctx.fillRect(x, y, CELL, 2);
          ctx.fillRect(x, y, 2, CELL);
          // Bush texture dots
          if ((r * 7 + c * 5) % 3 === 0) {
            ctx.fillStyle = "#4caf50";
            ctx.fillRect(x + 8, y + 12, 5, 5);
            ctx.fillRect(x + 18, y + 6, 4, 4);
          }
          // Draw carrot on some beds (about 30% chance based on position)
          // R3: skip eaten carrots
          if ((r * 13 + c * 7) % 5 < 2 && !(game && game.eatenCarrots && game.eatenCarrots.has(c + "," + r))) {
            drawCarrot(x + CELL / 2, y + CELL / 2);
          }
        } else {
          // Path — BROWN
          ctx.fillStyle = (r + c) % 2 === 0 ? "#4a3520" : "#3f2d1a";
          ctx.fillRect(x, y, CELL, CELL);
          // Subtle edge detail
          ctx.fillStyle = "rgba(0,0,0,0.1)";
          ctx.fillRect(x, y, CELL, 1);
        }
      }
    }
  }

  function drawCarrot(cx, cy) {
    animTime++;
    const sway = Math.sin(animTime * 0.05 + cx * 0.1) * 1.2;
    const rx = Math.floor(cx + sway), ry = Math.floor(cy);
    // Carrot body
    ctx.fillStyle = "#f7931e";
    ctx.fillRect(rx - 4, ry - 4, 8, 14);
    ctx.fillRect(rx - 3, ry + 10, 6, 6);
    ctx.fillRect(rx - 1, ry + 16, 2, 3);
    // Green top
    ctx.fillStyle = "#4caf50";
    ctx.fillRect(rx - 5, ry - 8, 3, 5);
    ctx.fillRect(rx + 2, ry - 8, 3, 5);
    ctx.fillRect(rx - 1, ry - 10, 2, 7);
  }

  function drawSnake() {
    const segs = game.snake;
    const len = segs.length;
    for (let i = len - 1; i >= 0; i--) {
      const seg = segs[i];
      const x = seg.x * CELL, y = seg.y * CELL;
      const isHead = i === 0;
      const fade = 1 - (i / (len + 5)) * 0.35;
      const g = Math.floor(0xe6 * fade);
      const b = Math.floor(0x76 * fade);
      // Outline
      ctx.fillStyle = "#1b3a0f";
      ctx.fillRect(x, y, CELL, CELL);
      // Body
      ctx.fillStyle = isHead ? "#00e676" : "rgb(0," + g + "," + b + ")";
      ctx.fillRect(x + 2, y + 2, CELL - 4, CELL - 4);
      if (isHead) {
        // Eyes
        ctx.fillStyle = "#1b3a0f";
        let ex1, ey1, ex2, ey2;
        const d = game.dir;
        if (d.dx === 1) { ex1 = x + 20; ey1 = y + 6; ex2 = x + 20; ey2 = y + 18; }
        else if (d.dx === -1) { ex1 = x + 5; ey1 = y + 6; ex2 = x + 5; ey2 = y + 18; }
        else if (d.dy === -1) { ex1 = x + 8; ey1 = y + 5; ex2 = x + 18; ey2 = y + 5; }
        else { ex1 = x + 8; ey1 = y + 20; ex2 = x + 18; ey2 = y + 20; }
        ctx.fillRect(ex1, ey1, 5, 5);
        ctx.fillRect(ex2, ey2, 5, 5);
        // Tongue flicker
        if (Math.floor(animTime / 10) % 2 === 0) {
          ctx.fillStyle = "#ff5252";
          const tx = x + CELL / 2 + d.dx * 12, ty = y + CELL / 2 + d.dy * 12;
          ctx.fillRect(tx - 1, ty - 1, 4, 4);
        }
      }
    }
  }

  function drawRabbit(r) {
    const x = Math.floor(r.vx), y = Math.floor(r.vy) - Math.floor(r.jumpOffset || 0);
    // Shadow when jumping
    if (r.jumping && r.jumpOffset > 2) {
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.fillRect(x - 7, Math.floor(r.vy) - 1, 14, 4);
    }
    // Body
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(x - 9, y - 9, 18, 18);
    // Pink ears
    ctx.fillStyle = "#ffcdd2";
    ctx.fillRect(x - 7, y - 18, 4, 10);
    ctx.fillRect(x + 3, y - 18, 4, 10);
    // Inner ear
    ctx.fillStyle = "#f48fb1";
    ctx.fillRect(x - 6, y - 16, 2, 5);
    ctx.fillRect(x + 4, y - 16, 2, 5);
    // Eyes
    ctx.fillStyle = "#212121";
    ctx.fillRect(x - 4, y - 3, 2, 2);
    ctx.fillRect(x + 3, y - 3, 2, 2);
    // Nose
    ctx.fillStyle = "#f48fb1";
    ctx.fillRect(x - 1, y + 1, 2, 2);
    // Carrot eating visual
    if (r.eatingCarrot) {
      ctx.fillStyle = "#f7931e";
      ctx.fillRect(x + 5, y - 4, 5, 3);
      ctx.fillStyle = "#4caf50";
      ctx.fillRect(x + 5, y - 7, 3, 3);
    }
    // Frozen overlay
    if (r.freezeTimer > 0) {
      ctx.fillStyle = "rgba(100,180,255,0.5)";
      ctx.fillRect(x - 10, y - 18, 20, 20);
    }
  }

  function drawHUD() {
    const sx = 10, sy = 6;
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(sx - 4, sy - 4, 240, 50);
    ctx.strokeStyle = "#8d6e4c";
    ctx.lineWidth = 1;
    ctx.strokeRect(sx - 4, sy - 4, 240, 50);
    // Score
    ctx.fillStyle = "#a5d6a7";
    ctx.font = "14px monospace";
    ctx.textBaseline = "top";
    ctx.fillText("SCORE", sx, sy);
    ctx.fillStyle = "#ffd54f";
    ctx.font = "bold 24px monospace";
    ctx.fillText(String(game.score).padStart(4, "0"), sx, sy + 16);
    // Level
    ctx.fillStyle = "#81c784";
    ctx.font = "12px monospace";
    ctx.fillText("LVL " + game.level, sx + 130, sy + 2);
    // Progress bar
    const progress = (game.rabbitsEaten % RABBITS_PER_LEVEL) / RABBITS_PER_LEVEL;
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.fillRect(sx + 130, sy + 18, 90, 8);
    ctx.fillStyle = progress > 0 ? "#81c784" : "rgba(255,255,255,0.1)";
    ctx.fillRect(sx + 130, sy + 18, Math.floor(90 * progress), 8);
    ctx.strokeStyle = "rgba(255,255,255,0.3)";
    ctx.strokeRect(sx + 130, sy + 18, 90, 8);
    // Bunny count
    ctx.fillStyle = "#ffffff";
    ctx.font = "11px monospace";
    ctx.fillText("BUNNY " + game.rabbits.length, sx + 130, sy + 32);
    // High score
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.font = "11px monospace";
    ctx.fillText("HI " + String(game.highScore).padStart(4, "0"), sx, sy + 44);
  }

  // ---------- Game loop ----------
  function gameLoop(timestamp) {
    if (!game) return;
    requestAnimationFrame(gameLoop);

    if (!game.alive) { render(); return; }

    if (game.lastTimestamp === 0) game.lastTimestamp = timestamp;
    let dt = timestamp - game.lastTimestamp;
    game.lastTimestamp = timestamp;
    if (dt > 200) dt = 200;

    game.accumulator += dt;
    updateParticles(dt);
    updateShake();

    const tickMs = currentTickMs(game.level);
    while (game.accumulator >= tickMs) {
      game.accumulator -= tickMs;

      if (game.rabbits.length < 3) {
        game.spawnTimer -= tickMs;
        if (game.spawnTimer <= 0) {
          respawnRabbit(game);
          game.spawnTimer = game.rabbits.length < 3 ? 3000 : 0;
        }
      }

      updateRabbits(game, tickMs);

      if (!updateSnake(game)) {
        gameOver();
        return;
      }
    }

    render();
  }

  function render() {
    ctx.save();
    const off = shakeOffset();
    if (off.x || off.y) ctx.translate(off.x, off.y);
    ctx.fillStyle = "#1b3a0f";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawMaze();
    if (game) {
      for (const r of game.rabbits) drawRabbit(r);
      drawSnake();
      drawHUD();
      drawParticles();
    }
    ctx.restore();
  }

  function gameOver() {
    if (!game) return;
    game.alive = false;
    if (game.score > game.highScore) {
      game.highScore = game.score;
      localStorage.setItem("crmz_hi", String(game.highScore));
    }
    const head = game.snake[0];
    const px = head.x * CELL + CELL / 2, py = head.y * CELL + CELL / 2;
    emitParticles(px, py, "#00e676", 20, 4, 600);
    emitParticles(px, py, "#ff5252", 10, 3, 400);
    doShake(10);

    let frames = 0;
    function deathAnim() {
      if (frames > 20) {
        document.getElementById("final-score").textContent = game.score;
        document.getElementById("final-level").textContent = game.level;
        document.getElementById("high-score").textContent = game.highScore;
        document.getElementById("game-over").classList.add("visible");
        return;
      }
      frames++;
      updateParticles(16);
      updateShake();
      render();
      requestAnimationFrame(deathAnim);
    }
    deathAnim();
  }

  // ---------- Start ----------
  function startGame() {
    if (game && game.alive) return; // R4: guard against double game loop
    document.getElementById("game-over").classList.remove("visible");
    game = newGame();
    // Rebuild bed graph from current game maze
    buildBedGraphFromMaze(game.maze);
    spawnInitialRabbits(game);
    game.alive = true;
    game.lastTimestamp = 0;
    game.accumulator = 0;
    animTime = 0;
    particles = [];
    requestAnimationFrame(gameLoop);
  }

  // ---------- Init ----------
  game = newGame();
  game.alive = false;
  ctx.fillStyle = "#1b3a0f";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Draw initial maze
  (function drawInit() {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const tile = game.maze[r][c];
        const x = c * CELL, y = r * CELL;
        if (tile === BED) {
          ctx.fillStyle = (r + c) % 2 === 0 ? "#4a7c3f" : "#3d5a2e"; // R1: lightened for contrast
          ctx.fillRect(x, y, CELL, CELL);
        } else {
          ctx.fillStyle = (r + c) % 2 === 0 ? "#4a3520" : "#3f2d1a";
          ctx.fillRect(x, y, CELL, CELL);
        }
      }
    }
  })();
  ctx.fillStyle = "#4caf50";
  ctx.font = "bold 24px monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("CARROT MAZE", canvas.width / 2, canvas.height / 2 - 30);
  ctx.fillStyle = "#a5d6a7";
  ctx.font = "16px monospace";
  ctx.fillText("Press any arrow key to start", canvas.width / 2, canvas.height / 2 + 15);
  game = null;

  canvas.addEventListener("click", startGame);

  const arrows = {ArrowUp:1,ArrowDown:1,ArrowLeft:1,ArrowRight:1,w:1,W:1,a:1,A:1,s:1,S:1,d:1,D:1};
  function starter(e) {
    if (!arrows[e.key]) return;
    if (e.key === "F5" || e.key === "F12") return;
    if (game && game.alive) return; // already started by handleKeyDown
    e.preventDefault();
    document.removeEventListener("keydown", starter);
    startGame();
    const dirName = keyMap[e.key];
    if (dirName) {
      game.nextDir = {dx: DIRS[dirName].dx, dy: DIRS[dirName].dy};
    }
  }
  document.addEventListener("keydown", starter);

})();
</script>
</body>
</html>
