<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrot Maze — Python vs Rabbits</title>
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;padding:0;background:radial-gradient(ellipse at center,#1e2a1e 0%,#0a0f0a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.035)2px,rgba(0,0,0,0.035)4px);pointer-events:none;z-index:100}
.game-wrapper{position:relative;border:3px solid #2d5a1e;border-radius:8px;box-shadow:0 0 40px rgba(45,90,30,0.3),inset 0 0 20px rgba(0,0,0,0.5);background:#1b3a0f}
canvas{display:block;width:600px;height:400px;image-rendering:pixelated;image-rendering:crisp-edges}
#game-over{position:absolute;inset:0;background:rgba(0,0,0,0.78);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:10;animation:fadeIn .4s ease-out;border-radius:5px}
#game-over.visible{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.game-over-title{font-family:'Courier New',monospace;font-size:36px;color:#ff5252;text-shadow:0 0 20px rgba(255,82,82,0.5);margin:0 0 8px;letter-spacing:4px}
.final-score{font-size:22px;color:#ffd54f;margin:4px 0}
.high-score{font-size:16px;color:#a5d6a7;margin:4px 0 16px}
.restart-btn{font-family:'Courier New',monospace;font-size:18px;padding:10px 32px;background:#4caf50;color:#fff;border:2px solid #66bb6a;border-radius:4px;cursor:pointer;transition:background .15s;letter-spacing:2px}
.restart-btn:hover{background:#66bb6a}
.hint{font-size:12px;color:rgba(255,255,255,0.4);margin-top:10px}
</style>
</head>
<body>
<div class="game-wrapper">
<canvas id="game" width="600" height="400"></canvas>
<div id="game-over">
<div class="game-over-title">GAME OVER</div>
<div class="final-score">Score: <span id="final-score">0</span></div>
<div class="high-score">Best: <span id="high-score">0</span></div>
<button class="restart-btn" id="restart-btn">PLAY AGAIN</button>
<div class="hint">Press ENTER or SPACE to restart</div>
</div>
</div>
<script>
(function(){
  "use strict";

  // ---------- Const ----------
  const COLS = 30, ROWS = 20, CELL = 20;
  const BASE_TICK_MS = 125; // 8 Hz
  function currentTickMs(score) {
    const eaten = Math.floor(score / 10);
    if (eaten < 5) return 125;
    if (eaten < 10) return 100;
    return 67;
  }
  const WALL=0, FLOOR=1, BED=2;
  const DIRS = {UP:{dx:0,dy:-1},DOWN:{dx:0,dy:1},LEFT:{dx:-1,dy:0},RIGHT:{dx:1,dy:0}};

  // ---------- Canvas ----------
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;

  // ---------- Maze Generation ----------
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function generateMaze() {
    const gridW = 14, gridH = 9;
    const maze = Array.from({length: ROWS}, () => Array(COLS).fill(WALL));

    const visited = Array.from({length: gridH}, () => Array(gridW).fill(false));

    function dfs(c, r) {
      visited[r][c] = true;
      const mx = c * 2 + 1, my = r * 2 + 1;
      maze[my][mx] = FLOOR;

      const dirs = shuffle([[0,-1],[0,1],[-1,0],[1,0]]);
      for (const [dc, dr] of dirs) {
        const nc = c + dc, nr = r + dr;
        if (nc >= 0 && nc < gridW && nr >= 0 && nr < gridH && !visited[nr][nc]) {
          maze[my + dr][mx + dc] = FLOOR;
          dfs(nc, nr);
        }
      }
    }

    dfs(Math.floor(gridW/2), Math.floor(gridH/2));

    // ---- Room carving ----
    const numRooms = 7 + Math.floor(Math.random() * 4);
    const rooms = [];

    for (let attempt = 0; attempt < 300 && rooms.length < numRooms; attempt++) {
      const rw = 2 + Math.floor(Math.random() * 2);
      const rh = 2 + Math.floor(Math.random() * 2);
      const rx = 1 + Math.floor(Math.random() * (COLS - rw - 1));
      const ry = 1 + Math.floor(Math.random() * (ROWS - rh - 1));

      let overlaps = false;
      for (const room of rooms) {
        if (rx < room.x + room.w + 1 && rx + rw + 1 > room.x &&
            ry < room.y + room.h + 1 && ry + rh + 1 > room.y) {
          overlaps = true;
          break;
        }
      }
      if (overlaps) continue;

      let connected = false;
      outer:
      for (let y = ry; y < ry + rh; y++) {
        for (let x = rx; x < rx + rw; x++) {
          for (const [dx, dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
            const nx = x + dx, ny = y + dy;
            if (nx >= 1 && nx < COLS-1 && ny >= 1 && ny < ROWS-1 &&
                (maze[ny][nx] === FLOOR || maze[ny][nx] === BED)) {
              connected = true;
              break outer;
            }
          }
        }
      }
      if (!connected) continue;

      rooms.push({x: rx, y: ry, w: rw, h: rh});
      for (let y = ry; y < ry + rh; y++)
        for (let x = rx; x < rx + rw; x++)
          maze[y][x] = BED;
    }

    // ---- BFS pathfinder ----
    function bfsPath(from, to) {
      const [sx, sy] = from, [ex, ey] = to;
      const vis = Array.from({length: ROWS}, () => Array(COLS).fill(false));
      const par = Array.from({length: ROWS}, () => Array(COLS).fill(null));
      const q = [[sx, sy]];
      vis[sy][sx] = true;

      for (let qi = 0; qi < q.length; qi++) {
        const [x, y] = q[qi];
        if (x === ex && y === ey) {
          const path = [];
          let px = x, py = y;
          while (px !== sx || py !== sy) {
            path.push([px, py]);
            [px, py] = par[py][px];
          }
          return path.reverse();
        }
        for (const [dx, dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !vis[ny][nx] &&
              (maze[ny][nx] === FLOOR || maze[ny][nx] === BED)) {
            vis[ny][nx] = true;
            par[ny][nx] = [x, y];
            q.push([nx, ny]);
          }
        }
      }
      return null;
    }

    // ---- Bed component finder ----
    function getBedComponents() {
      const comp = new Map();
      let cid = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (maze[r][c] !== BED || comp.has(c+','+r)) continue;
          cid++;
          const q = [[c, r]];
          comp.set(c+','+r, cid);
          for (let qi = 0; qi < q.length; qi++) {
            const [x, y] = q[qi];
            for (const [dx, dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
              const nx = x + dx, ny = y + dy;
              const nk = nx+','+ny;
              if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS &&
                  maze[ny][nx] === BED && !comp.has(nk)) {
                comp.set(nk, cid);
                q.push([nx, ny]);
              }
            }
          }
        }
      }
      return {comp, cid};
    }

    // ---- Connect bed components ----
    for (let mergeIter = 0; mergeIter < 20; mergeIter++) {
      const {comp, cid} = getBedComponents();
      if (cid <= 1) break;

      const compBeds = {};
      for (const [key, ci] of comp) {
        if (!compBeds[ci]) compBeds[ci] = [];
        compBeds[ci].push(key.split(',').map(Number));
      }

      const compKeys = Object.keys(compBeds);
      let bestDist = Infinity, bestFrom = null, bestTo = null;

      for (let i = 0; i < compKeys.length; i++) {
        for (let j = i + 1; j < compKeys.length; j++) {
          const ca = compBeds[compKeys[i]];
          const cb = compBeds[compKeys[j]];
          for (let ai = 0; ai < Math.min(5, ca.length); ai++) {
            const a = ca[Math.floor(Math.random() * ca.length)];
            for (let bi = 0; bi < Math.min(5, cb.length); bi++) {
              const b = cb[Math.floor(Math.random() * cb.length)];
              const dist = Math.abs(a[0] - b[0]) + Math.abs(a[1] - b[1]);
              if (dist < bestDist) { bestDist = dist; bestFrom = a; bestTo = b; }
            }
          }
        }
      }

      if (!bestFrom || bestDist > 20) break;

      const path = bfsPath(bestFrom, bestTo);
      if (path) {
        for (const [px, py] of path) {
          if (maze[py][px] === FLOOR) maze[py][px] = BED;
        }
      }
    }

    return maze;
  }

  const maze = generateMaze();


  // ---------- Bed graph ----------
  const bedCells = [];
  const bedNbrs = new Map();
  (function buildBedGraph() {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (maze[r][c] === BED) bedCells.push(c + "," + r);
      }
    }
    for (const key of bedCells) {
      const [x, y] = key.split(",").map(Number);
      const nbrs = [];
      for (const d of [DIRS.UP, DIRS.DOWN, DIRS.LEFT, DIRS.RIGHT]) {
        const nx = x + d.dx, ny = y + d.dy;
        if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && maze[ny][nx] === BED) {
          nbrs.push(nx + "," + ny);
        }
      }
      bedNbrs.set(key, nbrs);
    }
  })();

  // ---------- Shake ----------
  const shake = { intensity: 0, decay: 0.88 };
  function doShake(v) { shake.intensity = Math.max(shake.intensity, v); }
  function updateShake() {
    if (shake.intensity < 0.3) { shake.intensity = 0; return; }
    shake.intensity *= shake.decay;
  }
  function shakeOffset() {
    if (shake.intensity < 0.3) return { x: 0, y: 0 };
    return {
      x: (Math.random() - 0.5) * shake.intensity * 2,
      y: (Math.random() - 0.5) * shake.intensity * 2
    };
  }

  // ---------- Particles ----------
  let particles = [];
  function emitParticles(x, y, color, count, speed, life) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = speed * (0.3 + Math.random() * 0.7);
      particles.push({
        x: x, y: y, color: color,
        vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 1,
        size: 2 + Math.random() * 3, life: life * (0.5 + Math.random() * 0.5),
        maxLife: life * (0.5 + Math.random() * 0.5)
      });
    }
  }
  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * (dt / 16);
      p.y += p.vy * (dt / 16);
      p.vy += 0.15;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }
  function drawParticles() {
    for (const p of particles) {
      const alpha = Math.max(0, p.life / p.maxLife);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(Math.floor(p.x - p.size / 2), Math.floor(p.y - p.size / 2), p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  // ---------- BFS on bed graph ----------
  function bfsFromSnake(bedKeys, snakeHead) {
    const dist = new Map();
    for (const k of bedKeys) dist.set(k, 99);
    let closestKey = null, closestDist = Infinity;
    for (const k of bedKeys) {
      const [bx, by] = k.split(",").map(Number);
      const d = Math.abs(bx - snakeHead.x) + Math.abs(by - snakeHead.y);
      if (d < closestDist) { closestDist = d; closestKey = k; }
    }
    if (!closestKey) return dist;
    dist.set(closestKey, 0);
    const q = [closestKey];
    while (q.length > 0) {
      const cur = q.shift(), curD = dist.get(cur);
      for (const nb of (bedNbrs.get(cur) || [])) {
        if (dist.get(nb) > curD + 1) { dist.set(nb, curD + 1); q.push(nb); }
      }
    }
    return dist;
  }

  // ---------- Game state ----------
  let game = null;
  window.__g = game;


  // ---------- Safe snake start finder ----------
  function findSafeSnakeStart(maze) {
    const DIRS = [[0,-1],[0,1],[-1,0],[1,0]];

    // Score each candidate: prefer center, 2+ safe directions, clearance in at least 1 direction
    let best = null, bestScore = -1;

    for (let r = 2; r < ROWS - 2; r++) {
      for (let c = 3; c < COLS - 4; c++) {
        // Head must be on FLOOR (not BED, not WALL)
        if (maze[r][c] === WALL) continue;
        // Body cells must not be walls
        if (maze[r][c-1] === WALL || maze[r][c-2] === WALL) continue;

        // Count safe directions from head
        let safeDirs = 0, maxClear = 0;
        for (const [dx, dy] of DIRS) {
          const nx = c + dx, ny = r + dy;
          if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && maze[ny][nx] !== WALL) {
            safeDirs++;
            // Measure clearance in this direction
            let clear = 1;
            for (let i = 2; i < 10; i++) {
              const fx = c + dx * i, fy = r + dy * i;
              if (fx < 0 || fx >= COLS || fy < 0 || fy >= ROWS || maze[fy][fx] === WALL) break;
              clear++;
            }
            if (clear > maxClear) maxClear = clear;
          }
        }

        if (safeDirs < 2) continue;
        if (maxClear < 3) continue;

        // Score: prefer center + more clearance + more safe dirs
        const centerDist = Math.abs(c - COLS/2) + Math.abs(r - ROWS/2);
        const score = maxClear * 10 + safeDirs * 5 - centerDist;
        if (score > bestScore) {
          bestScore = score;
          best = {x: c, y: r};
        }
      }
    }

    if (best) return best;

    // Fallback: any position with 2+ safe directions
    for (let r = 2; r < ROWS - 2; r++) {
      for (let c = 2; c < COLS - 2; c++) {
        if (maze[r][c] === WALL) continue;
        let safeDirs = 0;
        for (const [dx, dy] of DIRS) {
          const nx = c + dx, ny = r + dy;
          if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && maze[ny][nx] !== WALL) safeDirs++;
        }
        if (safeDirs >= 2) return {x: c, y: r};
      }
    }

    // Absolute fallback
    for (let r = 1; r < ROWS - 1; r++)
      for (let c = 1; c < COLS - 1; c++)
        if (maze[r][c] !== WALL) return {x: c, y: r};
    return {x: 15, y: 10};
  }

  function newGame() {
    return {
      snake: (function() {
        const ss = findSafeSnakeStart(maze);
        return [{x:ss.x, y:ss.y}, {x:ss.x-1, y:ss.y}, {x:ss.x-2, y:ss.y}];
      })(),
      dir: {dx:0, dy:0}, nextDir: {dx:0, dy:0},
      growPending: 0,
      rabbits: [],
      score: 0,
      highScore: Math.max(0, parseInt(localStorage.getItem("crmz_hi") || "0")),
      alive: false,
      accumulator: 0,
      spawnTimer: 0
    };
  }

  // ---------- Rabbit AI ----------
  function randPersonality() {
    return { boldness: 0.3 + Math.random() * 0.5, skittishness: 0.2 + Math.random() * 0.7, speed: 0.5 + Math.random() * 0.5 };
  }

  function makeRabbit(bedKey) {
    const [bx, by] = bedKey.split(",").map(Number);
    const p = randPersonality();
    const interval = 2500 + p.boldness * 1500 + (Math.random() - 0.5) * 1000;
    return {
      bedKey: bedKey, prevBedKey: null,
      vx: bx * CELL + CELL / 2, vy: by * CELL + CELL / 2,
      jumping: false, targetBedKey: null, animProgress: 0, animDuration: 300, jumpOffset: 0,
      jumpTimer: interval * 0.3 + Math.random() * interval * 0.3,
      jumpInterval: interval,
      freezeTimer: 0,
      personality: p
    };
  }

  function spawnInitialRabbits(state) {
    const n = 4 + Math.floor(Math.random() * 2);
    const shuffled = [...bedCells].sort(() => Math.random() - 0.5);
    for (let i = 0; i < Math.min(n, shuffled.length); i++) {
      state.rabbits.push(makeRabbit(shuffled[i]));
    }
  }

  function respawnRabbit(state) {
    const occupied = new Set(state.rabbits.map(r => r.bedKey));
    const free = bedCells.filter(k => !occupied.has(k));
    if (free.length > 0) {
      state.rabbits.push(makeRabbit(free[Math.floor(Math.random() * free.length)]));
    }
  }

  function weightedPick(candidates) {
    if (candidates.length === 0) return null;
    if (candidates.length === 1) return candidates[0].bed;
    const total = candidates.reduce((s, c) => s + Math.max(0.01, c.score), 0);
    let r = Math.random() * total;
    for (const c of candidates) {
      r -= Math.max(0.01, c.score);
      if (r <= 0) return c.bed;
    }
    return candidates[candidates.length - 1].bed;
  }

  function fleeScore(bedKey, rabbit, bedDist, rabbits) {
    let score = (bedDist.get(bedKey) || 0) * 2;
    if (Math.random() < 0.2) score += (Math.random() - 0.5) * 10;
    if (rabbits.some(r => r.bedKey === bedKey && r !== rabbit)) score -= 3;
    if (bedKey === rabbit.prevBedKey) score -= 5;
    return score;
  }

  function roamScore(bedKey, rabbit, rabbits) {
    let score = 0;
    if (bedKey === rabbit.prevBedKey) score -= 0.4;
    if (rabbits.some(r => r.bedKey === bedKey && r !== rabbit)) score -= 0.5;
    score += (Math.random() - 0.5) * 0.8;
    return score;
  }

  function selectTarget(rabbit, state) {
    const nbrs = bedNbrs.get(rabbit.bedKey) || [];
    if (nbrs.length === 0) return null;
    const head = state.snake[0];
    const bedDist = bfsFromSnake(bedCells, head);
    const distToSnake = bedDist.get(rabbit.bedKey) || 99;
    const dangerThresh = 3 + rabbit.personality.skittishness * 2;
    let candidates;
    if (distToSnake <= dangerThresh) {
      candidates = nbrs.map(b => ({ bed: b, score: fleeScore(b, rabbit, bedDist, state.rabbits) }));
    } else {
      candidates = nbrs.map(b => ({ bed: b, score: roamScore(b, rabbit, state.rabbits) }));
    }
    candidates.sort((a, b) => b.score - a.score);
    return weightedPick(candidates.slice(0, Math.min(2, candidates.length)));
  }

  function startJump(rabbit, targetKey) {
    rabbit.targetBedKey = targetKey;
    rabbit.prevBedKey = rabbit.bedKey;
    rabbit.animProgress = 0;
    rabbit.animDuration = 300 / rabbit.personality.speed;
    rabbit.jumping = true;
    rabbit.jumpOffset = 0;
  }

  function finishJump(rabbit) {
    const [tx, ty] = rabbit.targetBedKey.split(",").map(Number);
    rabbit.vx = tx * CELL + CELL / 2;
    rabbit.vy = ty * CELL + CELL / 2;
    rabbit.bedKey = rabbit.targetBedKey;
    rabbit.targetBedKey = null;
    rabbit.jumping = false;
    rabbit.jumpOffset = 0;
    rabbit.jumpInterval = 2500 + rabbit.personality.boldness * 1500 + (Math.random() - 0.5) * 1000;
    rabbit.jumpTimer = rabbit.jumpInterval;
  }

  function updateRabbits(state, dt) {
    for (let i = state.rabbits.length - 1; i >= 0; i--) {
      const r = state.rabbits[i];
      if (r.jumping) {
        r.animProgress += dt / r.animDuration;
        if (r.animProgress >= 1) { finishJump(r); continue; }
        const [px, py] = (r.prevBedKey || r.bedKey).split(",").map(Number);
        const [tx, ty] = r.targetBedKey.split(",").map(Number);
        const t = easeInOutQuad(r.animProgress);
        r.vx = lerp(px * CELL + CELL / 2, tx * CELL + CELL / 2, t);
        r.vy = lerp(py * CELL + CELL / 2, ty * CELL + CELL / 2, t);
        r.jumpOffset = Math.sin(t * Math.PI) * 16;
        continue;
      }
      r.jumpTimer -= dt;
      // Freeze: 15% chance when <= 1 cell from snake head
      if (r.freezeTimer > 0) {
        r.freezeTimer -= dt;
        if (r.freezeTimer > 0) continue;
      }
      const head = state.snake[0];
      const [rbx, rby] = r.bedKey.split(",").map(Number);
      const distToHead = Math.abs(rbx - head.x) + Math.abs(rby - head.y);
      if (distToHead <= 1 && Math.random() < 0.15) {
        r.freezeTimer = 500;
        continue;
      }
      if (r.jumpTimer <= 0) {
        const target = selectTarget(r, state);
        if (target && target !== r.bedKey) startJump(r, target);
        else r.jumpTimer = r.jumpInterval;
      }
    }
  }

  function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
  function lerp(a, b, t) { return a + (b - a) * t; }

  // ---------- Snake update ----------
  function updateSnake(state) {
    state.dir = { dx: state.nextDir.dx, dy: state.nextDir.dy };
    // Don't move if no direction set yet
    if (state.dir.dx === 0 && state.dir.dy === 0) return true;
    const head = state.snake[0];
    const nh = { x: head.x + state.dir.dx, y: head.y + state.dir.dy };

    // Bounds + wall
    if (nh.x < 0 || nh.x >= COLS || nh.y < 0 || nh.y >= ROWS) return false;
    if (maze[nh.y][nh.x] === WALL) return false;

    // Self collision
    for (let i = 0; i < state.snake.length; i++) {
      if (state.snake[i].x === nh.x && state.snake[i].y === nh.y) return false;
    }

    state.snake.unshift(nh);
    let ate = false;

    for (let i = state.rabbits.length - 1; i >= 0; i--) {
      const r = state.rabbits[i];
      if (!r.jumping) {
        const [bx, by] = r.bedKey.split(",").map(Number);
        if (nh.x === bx && nh.y === by) {
          emitParticles(bx * CELL + CELL / 2, by * CELL + CELL / 2, "#ffffff", 12, 3, 500);
          emitParticles(bx * CELL + CELL / 2, by * CELL + CELL / 2, "#f7931e", 6, 2, 400);
          doShake(4);
          state.rabbits.splice(i, 1);
          state.score += 10;
          state.growPending++;
          ate = true;
          break;
        }
      }
    }

    if (state.growPending > 0) state.growPending--;
    else state.snake.pop();

    if (ate && state.rabbits.length < 3) state.spawnTimer = 3000;
    return true;
  }

  // ---------- Input ----------
  const keyMap = {
    ArrowUp: "UP", ArrowDown: "DOWN", ArrowLeft: "LEFT", ArrowRight: "RIGHT",
    w: "UP", W: "UP", s: "DOWN", S: "DOWN", a: "LEFT", A: "LEFT", d: "RIGHT", D: "RIGHT"
  };

  function handleKeyDown(e) {
    if (!game) return;
    if (!game.alive && (e.key === "Enter" || e.key === " " || e.key === "Space")) {
      e.preventDefault();
      startGame();
      return;
    }
    const dirName = keyMap[e.key];
    if (dirName) {
      e.preventDefault();
      const d = DIRS[dirName];
      if (game.nextDir.dx !== -d.dx || game.nextDir.dy !== -d.dy) {
        game.nextDir = d;
        // If snake was stationary (dir is zero), start moving now
        if (game.dir.dx === 0 && game.dir.dy === 0) {
          game.dir = {dx: d.dx, dy: d.dy};
          // accumulator stays at 0 — snake stays stationary for ~125ms
        }
      }
    }
  }

  document.addEventListener("keydown", handleKeyDown);
  document.getElementById("restart-btn").addEventListener("click", startGame);

  // ---------- Drawing ----------
  let animTime = 0;

  function drawMaze() {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const tile = maze[r][c];
        const x = c * CELL, y = r * CELL;
        if (tile === WALL) {
          ctx.fillStyle = "#1b3a0f";
          ctx.fillRect(x, y, CELL, CELL);
          ctx.fillStyle = "#2d5a1e";
          ctx.fillRect(x + 2, y + 2, 4, 4);
          ctx.fillRect(x + 10, y + 8, 4, 4);
          ctx.fillRect(x + 6, y + 14, 3, 3);
        } else if (tile === BED) {
          ctx.fillStyle = (r + c) % 2 === 0 ? "#4a3520" : "#3f2d1a";
          ctx.fillRect(x, y, CELL, CELL);
          drawCarrot(x + CELL / 2, y + CELL / 2);
        } else {
          ctx.fillStyle = (r + c) % 2 === 0 ? "#2d5a1e" : "#264d18";
          ctx.fillRect(x, y, CELL, CELL);
        }
      }
    }
  }

  function drawCarrot(cx, cy) {
    animTime++;
    const sway = Math.sin(animTime * 0.05 + cx * 0.1) * 1.2;
    const rx = Math.floor(cx + sway), ry = Math.floor(cy);
    ctx.fillStyle = "#f7931e";
    ctx.fillRect(rx - 3, ry - 2, 6, 10);
    ctx.fillRect(rx - 2, ry + 8, 4, 4);
    ctx.fillRect(rx - 1, ry + 12, 2, 2);
    ctx.fillStyle = "#4caf50";
    ctx.fillRect(rx - 4, ry - 5, 2, 4);
    ctx.fillRect(rx + 2, ry - 5, 2, 4);
    ctx.fillRect(rx - 1, ry - 6, 2, 5);
  }

  function drawSnake() {
    const segs = game.snake;
    const len = segs.length;
    for (let i = len - 1; i >= 0; i--) {
      const seg = segs[i];
      const x = seg.x * CELL, y = seg.y * CELL;
      const isHead = i === 0;
      const fade = 1 - (i / (len + 5)) * 0.35;
      const g = Math.floor(0xe6 * fade);
      const b = Math.floor(0x76 * fade);
      ctx.fillStyle = "#1b3a0f";
      ctx.fillRect(x, y, CELL, CELL);
      ctx.fillStyle = isHead ? "#00e676" : "rgb(0," + g + "," + b + ")";
      ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
      if (isHead) {
        ctx.fillStyle = "#1b3a0f";
        let ex1, ey1, ex2, ey2;
        const d = game.dir;
        if (d.dx === 1) { ex1 = x + 13; ey1 = y + 4; ex2 = x + 13; ey2 = y + 12; }
        else if (d.dx === -1) { ex1 = x + 3; ey1 = y + 4; ex2 = x + 3; ey2 = y + 12; }
        else if (d.dy === -1) { ex1 = x + 5; ey1 = y + 3; ex2 = x + 12; ey2 = y + 3; }
        else { ex1 = x + 5; ey1 = y + 13; ex2 = x + 12; ey2 = y + 13; }
        ctx.fillRect(ex1, ey1, 4, 4);
        ctx.fillRect(ex2, ey2, 4, 4);
        if (Math.floor(animTime / 10) % 2 === 0) {
          ctx.fillStyle = "#ff5252";
          const tx = x + CELL / 2 + d.dx * 8, ty = y + CELL / 2 + d.dy * 8;
          ctx.fillRect(tx - 1, ty - 1, 3, 3);
        }
      }
    }
  }

  function drawRabbit(r) {
    const x = Math.floor(r.vx), y = Math.floor(r.vy) - Math.floor(r.jumpOffset || 0);
    if (r.jumping && r.jumpOffset > 2) {
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.fillRect(x - 5, Math.floor(r.vy) - 1, 10, 3);
    }
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(x - 7, y - 7, 14, 14);
    ctx.fillStyle = "#ffcdd2";
    ctx.fillRect(x - 5, y - 13, 3, 7);
    ctx.fillRect(x + 2, y - 13, 3, 7);
    ctx.fillStyle = "#f48fb1";
    ctx.fillRect(x - 4, y - 12, 2, 4);
    ctx.fillRect(x + 3, y - 12, 2, 4);
    ctx.fillStyle = "#212121";
    ctx.fillRect(x - 3, y - 2, 2, 2);
    ctx.fillRect(x + 2, y - 2, 2, 2);
    ctx.fillStyle = "#f48fb1";
    ctx.fillRect(x - 1, y + 1, 2, 1);
    // Frozen overlay
    if (r.freezeTimer > 0) {
      ctx.fillStyle = "rgba(100,180,255,0.5)";
      ctx.fillRect(x - 8, y - 14, 16, 16);
    }
  }

  function drawHUD() {
    const sx = 10, sy = 6;
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(sx - 4, sy - 4, 170, 40);
    ctx.strokeStyle = "#4caf50";
    ctx.lineWidth = 1;
    ctx.strokeRect(sx - 4, sy - 4, 170, 40);
    ctx.fillStyle = "#a5d6a7";
    ctx.font = "10px monospace";
    ctx.textBaseline = "top";
    ctx.fillText("SCORE", sx, sy);
    ctx.fillStyle = "#ffd54f";
    ctx.font = "bold 18px monospace";
    ctx.fillText(String(game.score).padStart(4, "0"), sx, sy + 14);
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.font = "9px monospace";
    ctx.fillText("HI " + String(game.highScore).padStart(4, "0"), sx + 100, sy + 2);
    ctx.fillStyle = "#ffffff";
    ctx.font = "9px monospace";
    ctx.fillText("BUNNY " + game.rabbits.length, sx + 100, sy + 22);
  }

  // ---------- Game loop ----------
  function gameLoop(timestamp) {
    window.__g = game;
    if (!game) return;
    requestAnimationFrame(gameLoop);

    if (!game.alive) { render(); return; }

    if (game.lastTimestamp === 0) game.lastTimestamp = timestamp;
    let dt = timestamp - game.lastTimestamp;
    game.lastTimestamp = timestamp;
    if (dt > 200) dt = 200;

    game.accumulator += dt;
    updateParticles(dt);
    updateShake();

    const tickMs = currentTickMs(game.score);
    while (game.accumulator >= tickMs) {
      game.accumulator -= tickMs;

      if (game.rabbits.length < 3) {
        game.spawnTimer -= tickMs;
        if (game.spawnTimer <= 0) {
          respawnRabbit(game);
          game.spawnTimer = game.rabbits.length < 3 ? 3000 : 0;
        }
      }

      updateRabbits(game, tickMs);

      if (!updateSnake(game)) {
        gameOver();
        return;
      }
    }

    render();
  }

  function render() {
    ctx.save();
    const off = shakeOffset();
    if (off.x || off.y) ctx.translate(off.x, off.y);
    ctx.fillStyle = "#1b3a0f";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawMaze();
    if (game) {
      for (const r of game.rabbits) drawRabbit(r);
      drawSnake();
      drawHUD();
      drawParticles();
    }
    ctx.restore();
  }

  function gameOver() {
    if (!game) return;
    game.alive = false;
    if (game.score > game.highScore) {
      game.highScore = game.score;
      localStorage.setItem("crmz_hi", String(game.highScore));
    }
    const head = game.snake[0];
    const px = head.x * CELL + CELL / 2, py = head.y * CELL + CELL / 2;
    emitParticles(px, py, "#00e676", 20, 4, 600);
    emitParticles(px, py, "#ff5252", 10, 3, 400);
    doShake(10);

    let frames = 0;
    function deathAnim() {
      if (frames > 20) {
        document.getElementById("final-score").textContent = game.score;
        document.getElementById("high-score").textContent = game.highScore;
        document.getElementById("game-over").classList.add("visible");
        return;
      }
      frames++;
      updateParticles(16);
      updateShake();
      render();
      requestAnimationFrame(deathAnim);
    }
    deathAnim();
  }

  // ---------- Start ----------
  function startGame() {
    document.getElementById("game-over").classList.remove("visible");
    game = newGame();
    spawnInitialRabbits(game);
    game.alive = true;
    game.lastTimestamp = 0;
    game.accumulator = 0;
    animTime = 0;
    particles = [];
    requestAnimationFrame(gameLoop);
  }

  // ---------- Init ----------
  // Draw maze background (title screen)
  game = newGame();
  game.alive = false;
  ctx.fillStyle = "#1b3a0f";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawMaze();
  ctx.fillStyle = "#4caf50";
  ctx.font = "bold 16px monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("CARROT MAZE", canvas.width / 2, canvas.height / 2 - 20);
  ctx.fillStyle = "#a5d6a7";
  ctx.font = "12px monospace";
  ctx.fillText("Press any arrow key to start", canvas.width / 2, canvas.height / 2 + 10);
  game = null;

  // Click to start game (stationary snake)
  canvas.addEventListener("click", startGame);

  // First arrow key starts the game AND starts the snake moving
  const arrows = {ArrowUp:1,ArrowDown:1,ArrowLeft:1,ArrowRight:1,w:1,W:1,a:1,A:1,s:1,S:1,d:1,D:1};
  function starter(e) {
    if (!arrows[e.key]) return;
    if (e.key === "F5" || e.key === "F12") return;
    e.preventDefault();
    document.removeEventListener("keydown", starter);
    startGame();
    // Queue direction — snake waits stationary until first tick validates it
    const dirName = keyMap[e.key];
    if (dirName) {
      game.nextDir = {dx: DIRS[dirName].dx, dy: DIRS[dirName].dy};
    }
  }
  document.addEventListener("keydown", starter);

})();
</script>
</body>
</html>
